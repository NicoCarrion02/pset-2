services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=ny_taxi
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d ny_taxi"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 5s
  
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=nicoc2002@hotmail.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "9000:80"
    depends_on:
      - postgres
  
  mage:
    image: mageai/mageai
    volumes:
      - ./data-orquestador:/home/src
    ports:
      - "6789:6789"
    environment:
      DATABASE_CONNECTION_URL: postgresql+psycopg2://root:root@postgres:5432/ny_taxi
    command: /app/run_app.sh mage start orquestador
    depends_on:
      - postgres
volumes:
  postgres-volume: